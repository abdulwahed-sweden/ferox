[package]
name = "ferox"
version = "2.0.0"
edition = "2021"
authors = ["Abdulwahed Mansour <abdulwahed.mansour@gmail.com>"]
description = "Ferocious security framework built in Rust - Fast, Fierce, Fearless"
license = "MIT"
repository = "https://github.com/abdulwahed-sweden/ferox"
keywords = ["security", "penetration-testing", "cybersecurity", "framework", "ferox"]
categories = ["command-line-utilities", "development-tools"]

[[bin]]
name = "ferox"
path = "src/main.rs"

[dependencies]
# Async Runtime
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# CLI & Terminal
clap = { version = "4.5", features = ["derive", "color"] }
rustyline = "14.0"
colored = "2.1"
indicatif = "0.17"
console = "0.15"

# Networking
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
tokio-stream = "0.1"
trust-dns-resolver = "0.23"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error Handling & Logging
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.10", features = ["v4", "serde"] }
lazy_static = "1.5"

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
