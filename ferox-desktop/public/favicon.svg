    <path d="M8 2 L10 -8 L4 -3 Z" fill="url(#favGradient)"/>
    <!-- Eyes -->
    <circle cx="-3" cy="0" r="1.5" fill="#12161F"/>
    <circle cx="3" cy="0" r="1.5" fill="#12161F"/>
    <circle cx="-2.5" cy="-0.5" r="0.5" fill="#10B981"/>
    <circle cx="3.5" cy="-0.5" r="0.5" fill="#10B981"/>
