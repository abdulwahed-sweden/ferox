name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Ferox Core Library - Multi-platform Build
  # ============================================
  build-core:
    name: Build Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-core

      - name: Check (default features)
        run: cargo check --all-targets

      - name: Check (with pdf-export)
        run: cargo check --all-targets --features pdf-export

  # ============================================
  # Code Quality - Clippy & Format
  # ============================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (with pdf-export)
        run: cargo clippy --all-targets --features pdf-export -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # ============================================
  # Unit & Integration Tests
  # ============================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: test

      - name: Run tests (default features)
        run: cargo test --all -- --quiet

      - name: Run tests (with pdf-export)
        run: cargo test --all --features pdf-export -- --quiet

  # ============================================
  # Ferox Desktop - Tauri Build
  # ============================================
  build-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ferox-desktop/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-desktop
          workspaces: |
            . -> target
            ferox-desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ferox-desktop
        run: npm ci

      - name: Build frontend
        working-directory: ferox-desktop
        run: npm run build

      - name: Check Tauri build
        working-directory: ferox-desktop
        run: cargo check --manifest-path src-tauri/Cargo.toml

  # ============================================
  # Frontend Tests (Vitest)
  # ============================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ferox-desktop/package-lock.json

      - name: Install dependencies
        working-directory: ferox-desktop
        run: npm ci

      - name: Run tests
        working-directory: ferox-desktop
        run: npm run test:run

  # ============================================
  # Release Build (on tags)
  # ============================================
  release:
    name: Release Build
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-core, lint, test, build-desktop, test-frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ferox-desktop/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-release

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build CLI release
        run: cargo build --release

      - name: Build Desktop release
        working-directory: ferox-desktop
        run: |
          npm ci
          npm run tauri build

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferox-cli-${{ matrix.os }}
          path: |
            target/release/ferox
            target/release/ferox.exe
          if-no-files-found: ignore

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferox-desktop-${{ matrix.os }}
          path: |
            ferox-desktop/src-tauri/target/release/bundle/
          if-no-files-found: ignore
