<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fox Icon -->
  <g transform="translate(5, 5)">
    <!-- Fox head - geometric style -->
    <path d="M25 5 L40 25 L35 45 L25 40 L15 45 L10 25 Z"
          fill="url(#primaryGradient)" filter="url(#glow)"/>
    <!-- Left ear -->
    <path d="M10 25 L5 8 L18 18 Z" fill="url(#primaryGradient)"/>
    <!-- Right ear -->
    <path d="M40 25 L45 8 L32 18 Z" fill="url(#primaryGradient)"/>
    <!-- Eyes - cyber style -->
    <circle cx="18" cy="25" r="3" fill="#12161F"/>
    <circle cx="32" cy="25" r="3" fill="#12161F"/>
    <circle cx="19" cy="24" r="1" fill="#10B981"/>
    <circle cx="33" cy="24" r="1" fill="#10B981"/>
    <!-- Nose -->
    <path d="M25 32 L22 36 L28 36 Z" fill="#12161F"/>
    <!-- Circuit lines -->
    <path d="M5 42 L15 42 L18 38" stroke="#3B82F6" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M45 42 L35 42 L32 38" stroke="#10B981" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Text: FEROX -->
  <g transform="translate(60, 15)">
    <text x="0" y="30" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#primaryGradient)">
      FEROX
    </text>
    <!-- Tagline -->
    <text x="2" y="45" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="400" fill="#6B7280" letter-spacing="2">
      PENETRATION TESTING
    </text>
  </g>
</svg>
