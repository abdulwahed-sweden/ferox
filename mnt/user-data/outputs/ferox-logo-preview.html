<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferox Logo Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding: 40px;
    }
    h1 { text-align: center; margin-bottom: 40px; font-size: 2.5rem; }
    h2 { margin: 40px 0 20px; color: #888; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      border: 1px solid #333;
    }
    .card.light {
      background: #f5f5f5;
      border-color: #ddd;
    }
    .card img, .card svg {
      width: 120px;
      height: 120px;
      margin-bottom: 15px;
    }
    .card p {
      color: #888;
      font-size: 0.9rem;
    }
    .card.light p {
      color: #666;
    }
    .sizes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 30px;
      background: #1a1a1a;
      border-radius: 16px;
      border: 1px solid #333;
    }
    .sizes img {
      display: block;
    }
    .size-label {
      text-align: center;
      color: #666;
      font-size: 0.75rem;
      margin-top: 5px;
    }
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .original-vs-traced {
      padding: 30px;
      border-radius: 16px;
      text-align: center;
    }
    .original-vs-traced.dark { background: #1a1a1a; border: 1px solid #333; }
    .original-vs-traced.light { background: #f5f5f5; border: 1px solid #ddd; }
    .original-vs-traced img {
      max-width: 200px;
      height: auto;
    }
    .original-vs-traced h3 {
      margin-bottom: 20px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>🦊 Ferox Logo</h1>

  <h2>Color Variants</h2>
  <div class="grid">
    <div class="card">
      <img src="ferox-logo-orange.svg" alt="Orange">
      <p>Orange (Primary)<br><code>#FF7F00</code></p>
    </div>
    <div class="card">
      <img src="ferox-logo-white.svg" alt="White">
      <p>White (Dark BG)<br><code>#FFFFFF</code></p>
    </div>
    <div class="card light">
      <img src="ferox-logo-dark.svg" alt="Dark">
      <p>Dark (Light BG)<br><code>#12161F</code></p>
    </div>
    <div class="card">
      <img src="ferox-logo-blue.svg" alt="Blue">
      <p>Blue (Accent)<br><code>#3B82F6</code></p>
    </div>
  </div>

  <h2>Size Test</h2>
  <div class="sizes">
    <div>
      <img src="ferox-logo-orange.svg" width="128" height="128" alt="128px">
      <div class="size-label">128px</div>
    </div>
    <div>
      <img src="ferox-logo-orange.svg" width="64" height="64" alt="64px">
      <div class="size-label">64px</div>
    </div>
    <div>
      <img src="ferox-logo-orange.svg" width="48" height="48" alt="48px">
      <div class="size-label">48px</div>
    </div>
    <div>
      <img src="ferox-logo-orange.svg" width="32" height="32" alt="32px">
      <div class="size-label">32px</div>
    </div>
    <div>
      <img src="ferox-logo-orange.svg" width="24" height="24" alt="24px">
      <div class="size-label">24px</div>
    </div>
    <div>
      <img src="ferox-logo-orange.svg" width="16" height="16" alt="16px">
      <div class="size-label">16px</div>
    </div>
  </div>

  <h2>Original vs Traced</h2>
  <div class="comparison">
    <div class="original-vs-traced dark">
      <h3>Original PNG</h3>
      <img src="ferox-logo.png" alt="Original">
    </div>
    <div class="original-vs-traced dark">
      <h3>Traced SVG</h3>
      <img src="ferox-logo-orange.svg" alt="Traced">
    </div>
  </div>

</body>
</html>
