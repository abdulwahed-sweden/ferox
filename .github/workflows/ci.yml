name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --all-targets --features pdf-export
      - name: Clippy
        run: cargo clippy --all-targets --features pdf-export -- -D warnings
      - name: Test
        run: cargo test --all --features pdf-export -- --quiet

