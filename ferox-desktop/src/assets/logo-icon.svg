<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="foxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="foxGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (optional, for icons) -->
  <circle cx="50" cy="50" r="48" fill="#12161F"/>

  <!-- Fox head - geometric cyber style -->
  <g transform="translate(50, 50)">
    <!-- Main head shape -->
    <path d="M0 -30 L25 5 L18 35 L0 28 L-18 35 L-25 5 Z"
          fill="url(#foxGradient)" filter="url(#foxGlow)"/>

    <!-- Left ear -->
    <path d="M-25 5 L-32 -25 L-12 -10 Z" fill="url(#foxGradient)"/>

    <!-- Right ear -->
    <path d="M25 5 L32 -25 L12 -10 Z" fill="url(#foxGradient)"/>

    <!-- Eyes - cyber LED style -->
    <ellipse cx="-10" cy="0" rx="5" ry="6" fill="#12161F"/>
    <ellipse cx="10" cy="0" rx="5" ry="6" fill="#12161F"/>
    <circle cx="-8" cy="-2" r="2" fill="#10B981"/>
    <circle cx="12" cy="-2" r="2" fill="#10B981"/>

    <!-- Nose -->
    <path d="M0 12 L-5 20 L5 20 Z" fill="#12161F"/>

    <!-- Circuit accents -->
    <path d="M-32 30 L-18 30 L-14 22" stroke="#3B82F6" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M32 30 L18 30 L14 22" stroke="#10B981" stroke-width="1.5" fill="none" opacity="0.7"/>
    <circle cx="-32" cy="30" r="2" fill="#3B82F6" opacity="0.8"/>
    <circle cx="32" cy="30" r="2" fill="#10B981" opacity="0.8"/>
  </g>
</svg>
